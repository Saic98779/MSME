<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MSME API Docs</title>
</head>
<body>
<div id="app"></div>

<script id="api-reference" data-url="/v3/api-docs"></script>
<script>
    (function () {
        var script = document.getElementById('api-reference');
        var path = window.location.pathname;
        var marker = '/swagger-ui';
        var markerIndex = path.indexOf(marker);
        var contextPath = markerIndex > -1 ? path.substring(0, markerIndex) : '';

        script.setAttribute('data-url', contextPath + '/v3/api-docs');
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
